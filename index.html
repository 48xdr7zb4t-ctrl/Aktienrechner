<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nutzen-Check</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="body-content">Lädt...</div>

  <script>
  

  const APP_SCRIPTS = [
  "./utils.js",
  "./criteria-registry.js",
  "./taxonomy.js",
  "./rules.js",
  "./stress.js",
  "./fair-value.js",
  "./parsing.js",
  "./engines.js",
  "./mode-registry.js",
  "./modipresets.js",
  "./overlay.js",
  "./tools.js",
  "./render.js",
  "./init.js"
];

    function loadScriptSequentially(srcList) {
      return srcList.reduce((promise, src) => {
        return promise.then(() => new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = src;
          script.onload = resolve;
          script.onerror = () => reject(new Error("Script konnte nicht geladen werden: " + src));
          document.body.appendChild(script);
        }));
      }, Promise.resolve());
    }

    async function bootApp() {
      try {
        const res = await fetch("./body.html");
        if (!res.ok) throw new Error("body.html konnte nicht geladen werden");

        const html = await res.text();
        document.getElementById("body-content").innerHTML = html;

        await loadScriptSequentially(APP_SCRIPTS);

        if (typeof window.initApp === "function") {
          window.initApp();
        } else {
          console.error("initApp wurde nicht gefunden.");
          document.getElementById("body-content").insertAdjacentHTML(
            "afterbegin",
            '<div style="padding:16px;color:red;">Fehler: initApp wurde nicht gefunden.</div>'
          );
        }
      } catch (err) {
        console.error(err);
        document.getElementById("body-content").innerHTML =
          `<div style="padding:16px;color:red;">Fehler beim Laden: ${String(err.message || err)}</div>`;
      }
    }

    bootApp();
  </script>
</body>
</html>
